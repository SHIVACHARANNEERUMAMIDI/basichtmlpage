<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./style.css" rel="stylesheet">
</head>
<body>
    <div class="form">
    <h1>Registration form:</h1>
    <form>
        <h1>name</h1>
        <input name="nae" placeholder="enter you name">
        <h1>roll number</h1>
        <input name="roll-number" placeholder="enter you roll-number">
        <h1>sem:</h1>
        <input name="sem" placeholder="enter sem(odd/even)">
        <h1>course</h1>
        <input name="course" placeholder="enter course">
        <br>
        <input type="checkbox" id="DP" name="DP" value="Dp"> dp
        <input type="checkbox" id="EP" name="ep" value="ep"> EP
        <input type="checkbox" id="mern" name="mern" value="mern"> mern
        <h1>phone number</h1>
        <input name="phonenumber" placeholder="enter your phone number">
        <hr>
        <br>
        <button>
            submit
        </button>
    </form>
</div>
</body>
</html>
